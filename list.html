      ],

      ],

      ]
    };

    // 学年ルール
    // ==========
    const gradesRule = {
      grad: {
        syushi: [1, 2],
        hakase: [1, 2, 3]
      },
      univ: [1, 2, 3, 4],
      junior: [1, 2]
    };

    const yen = n => (n ?? 0).toLocaleString("ja-JP") + "円";
    const category = document.getElementById("category");
    const program = document.getElementById("program");
    const gakunen = document.getElementById("gakunen");
    const result = document.getElementById("result");

    function makeCard(d) {
      if (!d) return "";
      const rows = (d.items || []).map(([k, v]) => `
        <div class="row">
          <div class="label">${k}</div>
          <div class="val">${yen(v)}</div>
        </div>
      `).join("");

      return `
        <div class="card">
          <div><strong>${d.title}</strong><span class="badge">内訳</span></div>
          <div class="total">合計：${yen(d.total)}</div>
          <div class="rows">${rows}</div>
        </div>
      `;
    }

   function makeAnnualCard(d, label) {
     if (!d) return "";
     const noteHtml = d.note ? `<div class="meta">${d.note}</div>` : "";
   return `
     <div class="card">
       <div><strong>${d.title}</strong><span class="badge">${label}</span></div>
       <div class="total">合計：${yen(d.total)}</div>
      ${noteHtml}
    </div>
  `;
   }

    function render() {
      const p = program.value;
      const g = gakunen.value;

      result.innerHTML = "";
      errorBox.style.display = "none";

      if (!p || !g) return;

      const rec = (data[p] && data[p][g]) ? data[p][g] : null;
      if (!rec) {
        result.innerHTML = `<div class="card">この学科・学年のデータは未入力です。</div>`;
        return;
      }

      result.innerHTML = `
        ${makeCard(rec.zenki)}
        ${makeCard(rec.kouki)}
        ${makeAnnualCard(rec.annual, "年額")}
        ${makeAnnualCard(rec.annual_total, "総額(目安)")}

        <p class="meta">
          資格取得等のために特別に必要となる経費は別途徴収いたします。<br>
          翌年以降の学納金等については、社会経済情勢等、学内外の諸般の要因を参考に決定します。
        </p>
      `;
    }

    function resetProgram() {
      program.innerHTML = `<option value="">所属を選択してください</option>`;
      program.disabled = true;
      program.value = "";
    }

    function resetGrades() {
      gakunen.innerHTML = `<option value="">学年を選択してください</option>`;
      gakunen.disabled = true;
      gakunen.value = "";
    }

    function rebuildProgramOptions() {
      resetProgram();
      const list = programsByCategory[category.value];
      if (!list) return;

      list.forEach(p => {
        const opt = document.createElement("option");
        opt.value = p.value;
        opt.textContent = p.label;
        program.appendChild(opt);
      });
      program.disabled = false;
    }

    function getAllowedGrades(cat, prog) {
      if (!cat || !prog) return [];

      if (cat === "grad") {
        const map = gradesRule.grad;
        return (map && map[prog]) ? map[prog] : [];
      }

      if (cat === "vocational") {
        const map = gradesRule.vocational;
        return (map && map[prog]) ? map[prog] : [];
      }

      return gradesRule[cat] || [];
    }

    function rebuildGradeOptions() {
      resetGrades();
      result.innerHTML = "";
      errorBox.style.display = "none";

      const cat = category.value;
      const prog = program.value;
      const allowed = getAllowedGrades(cat, prog);

      if (!allowed.length) return;

      allowed.forEach(v => {
        const opt = document.createElement("option");
        opt.value = String(v);
        opt.textContent = `${v}年`;
        gakunen.appendChild(opt);
      });

      gakunen.disabled = false;
    }

    // ==========
    // イベント
    // ==========
    category.addEventListener("change", () => {
      result.innerHTML = "";
      errorBox.style.display = "none";
      rebuildProgramOptions();
      resetGrades();
    });

    program.addEventListener("change", () => {
      rebuildGradeOptions();
      render();
    });

    gakunen.addEventListener("change", render);

    // 初期化
    resetProgram();
    resetGrades();
    render();

  } catch (e) {
    showError("ページの中でエラーが起きました。\n\n" + (e && e.stack ? e.stack : e));
  }
})();
