<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>延納・分納の手続き</title>

<style>
body{
    margin:0;
    font-family:"Yu Gothic","Meiryo",sans-serif;
    background:#f2f5f9;
    color:#222;
}

.container{
    max-width:900px;
    margin:0 auto;
    padding:45px 20px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:36px;
    margin:0;
    padding:18px 0;
    border-top:4px solid #003B8E;
    border-bottom:4px solid #003B8E;
}

.section-title{
    font-size:30px;
    font-weight:bold;
    border-bottom:3px solid #003B8E;
    padding-bottom:10px;
    margin-bottom:25px;
}

.info-box{
    background:#fff;
    border-radius:14px;
    padding:22px 26px;
    margin-bottom:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.info-title{
    font-size:21px;
    font-weight:bold;
    margin-bottom:10px;
}

.info-text{
    font-size:17px;
    line-height:1.8;
}

.download-btn{
    display:inline-block;
    margin-top:16px;
    padding:12px 18px;
    background:#003B8E;
    color:#fff;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:.2s;
}

.download-btn:hover{
    background:#0055c5;
}

.address-box{
    margin-top:35px;
    padding:22px;
    background:#fff;
    border-left:6px solid #003B8E;
    border-radius:12px;
    line-height:1.9;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
}

@media(max-width:768px){

    .header h1{
        font-size:28px;
    }

    .section-title{
        font-size:24px;
    }

    .info-title{
        font-size:18px;
    }

    .info-text{
        font-size:16px;
    }

}
</style>

</head>
<body>

<div class="container">

<div class="header">
<h1>📝 延納・分納の手続き</h1>
</div>

<section>

<h2 class="section-title">延納をご希望の方</h2>

<div class="info-box">

<div class="info-title">
期日までにお支払いが難しい場合
</div>

<div class="info-text">

延納をご希望の場合は、
延納願をダウンロードし、
必要事項をご記入のうえ、
下記住所までご返送ください。

<br><br>

<a href="延納願.pdf"
   class="download-btn"
   target="_blank"
   rel="noopener">
📥 延納願（PDF）
</a>

</div>

</div>

</section>

<section>

<h2 class="section-title">分納をご希望の方</h2>

<div class="info-box">

<div class="info-title">
学費を分けてお支払いしたい場合
</div>

<div class="info-text">

分納をご希望の場合は、
分納願をダウンロードし、
必要事項をご記入のうえ、
下記住所までご返送ください。

<br><br>

<a href="分納願.pdf"
   class="download-btn"
   target="_blank"
   rel="noopener">
📥 分納願（PDF）
</a>

</div>

</div>

</section>

<div class="address-box">

<strong>送付先</strong><br><br>

〒170-8481<br>
東京都豊島区駒込3-24-3<br>
学校法人 香川栄養学園<br>
会計課  宛

</div>

</div>

</body>
</html>
