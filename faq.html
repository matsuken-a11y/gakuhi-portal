<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>よくある質問</title>

<style>
body{
    margin:0;
    font-family:"Yu Gothic","Meiryo",sans-serif;
    background:#f2f5f9;
    color:#222;
}

.container{
    max-width:900px;
    margin:0 auto;
    padding:45px 20px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:36px;
    margin:0;
    padding:18px 0;
    border-top:4px solid #003B8E;
    border-bottom:4px solid #003B8E;
}

.section-title{
    font-size:30px;
    font-weight:bold;
    border-bottom:3px solid #003B8E;
    padding-bottom:10px;
    margin-bottom:25px;
}

.info-box{
    background:#fff;
    border-radius:14px;
    padding:22px 26px;
    margin-bottom:20px;
    box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.info-title{
    font-size:21px;
    font-weight:bold;
    margin-bottom:10px;
}

.info-text{
    font-size:17px;
    line-height:1.8;
}

@media(max-width:768px){
    .header h1{
        font-size:28px;
    }

    .section-title{
        font-size:26px;
    }

    .info-title{
        font-size:18px;
    }

    .info-text{
        font-size:16px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>よくある質問</h1>
    </div>

    <section class="section">
        <h2 class="section-title">学納金について</h2>

        <div class="info-box">
            <div class="info-title">Q. 振込のときに依頼人コードの入力を忘れてしまった</div>
            <div class="info-text">A. 学生の名前で入力してあれば問題ございません。</div>
        </div>

        <div class="info-box">
            <div class="info-title">Q. 期日を過ぎてしまったが、支払いは可能か？</div>
            <div class="info-text">A. 可能です。学納金のお支払いサイトからお支払いください。</div>
        </div>

        <div class="info-box">
            <div class="info-title">Q. 期日までに支払うことが難しい場合はどうすればよいですか？</div>
            <div class="info-text">A. 延納をご希望の場合は、延納願をご提出ください。</div>
        </div>

        <div class="info-box">
            <div class="info-title">Q. 学費を分けて支払うことはできますか？</div>
            <div class="info-text">A. 分納をご希望の場合は、分納願をご提出ください。</div>
        </div>

    </section>

</div>

</body>
</html>
