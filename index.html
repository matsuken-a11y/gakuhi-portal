<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学納金(在学生)</title>

<style>
body{
    margin:0;
    font-family:"Yu Gothic","Meiryo",sans-serif;
    background:#f2f5f9;
    color:#222;
}

.container{
    max-width:900px;
    margin:0 auto;
    padding:45px 20px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.header h1{
    font-size:36px;
    margin:0;
    padding:18px 0;
    border-top:4px solid #003B8E;
    border-bottom:4px solid #003B8E;
}

.portal-menu{
    display:flex;
    flex-direction:column;
    gap:22px;
    margin-bottom:70px;
}

.portal-card{
    display:flex;
    align-items:center;
    gap:20px;
    padding:28px 30px;
    background:#fff;
    border-radius:16px;
    border-left:8px solid #003B8E;
    text-decoration:none;
    color:#222;
    box-shadow:0 5px 14px rgba(0,0,0,.08);
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
}

.portal-card:hover{
    transform:translateY(-5px) scale(1.02);
    box-shadow:0 14px 28px rgba(0,0,0,.16);
    background:linear-gradient(90deg,#fff,#f4f9ff);
}

.portal-card:active{
    transform:translateY(-1px) scale(.99);
}

.icon{
    font-size:60px;
    width:80px;
    text-align:center;
    flex-shrink:0;
    transition:transform .18s ease;
}

.portal-card:hover .icon{
    transform:scale(1.15);
}

.text{
    flex:1;
}

.title{
    font-size:24px;
    font-weight:800;
    letter-spacing:0.5px;
}

.caption{
    font-size:15px;
    color:#555;
}

.arrow{
    font-size:30px;
    color:#003B8E;
}

.pay{ border-left-color:#1f8f4d; }
.fee{ border-left-color:#0066cc; }
.faq{ border-left-color:#e0a800; }
.form{ border-left-color:#7b4fc9; }

.footer-logo{
    margin-top:20px;
    padding-top:35px;
    border-top:2px solid #d8dee8;
    text-align:center;
}

.footer-logo img{
    max-width:260px;
    width:70%;
    height:auto;
}

@media(max-width:768px){
    .header h1{
        font-size:28px;
    }

    .portal-card{
        padding:20px 18px;
        gap:14px;
    }

    .icon{
        font-size:38px;
        width:48px;
    }

    .title{
        font-size:21px;
        letter-spacing:0;
        white-space:nowrap;
    }

    .arrow{
        font-size:26px;
    }

    .caption{
        display:none;
        margin-top:8px;
        font-size:15px;
    }

    .portal-card.mobile-expanded .caption{
        display:block;
    }

    .portal-card.mobile-expanded{
        background:linear-gradient(90deg,#fff,#f4f9ff);
    }

    .footer-logo img{
        max-width:210px;
        width:75%;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🎓 学納金（在学生）</h1>
    </div>

    <div class="portal-menu">

        <a class="portal-card pay"
           href="https://eiyo-payer.postaedufee.jp/login/PayerLogin"
           target="_blank"
           rel="noopener">
            <div class="icon">💳</div>
            <div class="text">
                <div class="title">学納金を支払う</div>
                <div class="caption">学納金のお支払いサイトへ移動します</div>
            </div>
            <div class="arrow">›</div>
        </a>

        <a class="portal-card fee"
           href="学納金等一覧.html"
           target="_blank"
           rel="noopener">
            <div class="icon">📄</div>
            <div class="text">
                <div class="title">金額を確認する</div>
                <div class="caption">学納金等一覧表を確認できます</div>
            </div>
            <div class="arrow">›</div>
        </a>

        <a class="portal-card faq"
           href="faq.html"
           target="_blank"
           rel="noopener">
            <div class="icon">❓</div>
            <div class="text">
                <div class="title">質問を見る</div>
                <div class="caption">よくある質問をご覧いただけます</div>
            </div>
            <div class="arrow">›</div>
        </a>

        <a class="portal-card form"
           href="forms.html"
           target="_blank"
           rel="noopener">
            <div class="icon">📝</div>
            <div class="text">
                <div class="title">延納・分納の手続き</div>
                <div class="caption">延納願・分納願をダウンロードできます</div>
            </div>
            <div class="arrow">›</div>
        </a>

    </div>

    <div class="footer-logo">
        <img src="logo.svg">
    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const cards = document.querySelectorAll(".portal-card");

    cards.forEach(card => {
        card.addEventListener("click", function(e){

            if (window.innerWidth > 768) return;

            if (!card.classList.contains("mobile-expanded")) {
                e.preventDefault();

                cards.forEach(c => c.classList.remove("mobile-expanded"));
                card.classList.add("mobile-expanded");
            }

        });
    });

});
</script>

</body>
</html>
